name: Build and Release APKs

on:
  push:
    tags:
      - 'v*' # Triggers on tags starting with v, e.g., v1.0.0

permissions:
  contents: write # Required to create releases and upload assets

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java Environment (JDK 17 required for modern Android Gradle builds)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 3. Setup Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. Build Phone Application
      - name: Build Phone App APK
        run: |
          cd phone
          flutter pub get
          VERSION_NAME=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          flutter build apk --release --build-name=$VERSION_NAME --build-number=${{ github.run_number }}
          
      # 5. Build TV Application
      - name: Build TV App APK
        run: |
          cd tv
          flutter pub get
          VERSION_NAME=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          flutter build apk --release --build-name=$VERSION_NAME --build-number=${{ github.run_number }}

      # 6. Prepare assets (rename APKs for clarity in release)
      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets
          cp phone/build/app/outputs/flutter-apk/app-release.apk release-assets/noti-mirror-phone-${{ github.ref_name }}.apk
          cp tv/build/app/outputs/flutter-apk/app-release.apk release-assets/noti-mirror-tv-${{ github.ref_name }}.apk

      # 7. Get Tag Message
      - name: Get Tag Message
        id: tag_message
        run: |
          git fetch --tags --force
          # Extract annotation message of the current tag
          TAG_MSG=$(git tag -l --format='%(contents)' ${{ github.ref_name }})
          if [ -z "$TAG_MSG" ]; then
            TAG_MSG="Bản phát hành tự động cho phiên bản ${{ github.ref_name }}."
          fi
          
          # Multiline output handling in GitHub Actions
          echo "tag_msg<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 8. Create GitHub Release and Upload Assets
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/noti-mirror-phone-${{ github.ref_name }}.apk
            release-assets/noti-mirror-tv-${{ github.ref_name }}.apk
          name: Release ${{ github.ref_name }}
          body: |
            ## TV Notification Mirror Release ${{ github.ref_name }}
            
            ${{ steps.tag_message.outputs.tag_msg }}
            
            ### Danh sách tệp tải về:
            * **[Điện thoại]** `noti-mirror-phone-${{ github.ref_name }}.apk`: Cài đặt trên Điện thoại Android.
            * **[TV]** `noti-mirror-tv-${{ github.ref_name }}.apk`: Cài đặt trên Android TV / Google TV.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
